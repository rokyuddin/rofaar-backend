services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://rofaar:rofaar@db:5432/rofaar
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rofaar-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=rofaar
      - POSTGRES_PASSWORD=rofaar
      - POSTGRES_DB=rofaar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rofaar -d rofaar"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rofaar-net

volumes:
  pgdata:

networks:
  rofaar-net:
    driver: bridge
