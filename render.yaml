services:
  - type: web
    name: rofaar-backend
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm db:migrate && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: rofaar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ENABLE_SWAGGER
        value: "true"
      - key: API_HOST
        syncWithValue: true # This will use the service's generated URL

databases:
  - name: rofaar-db
    plan: free
    databaseName: rofaar
    user: rofaar_user
    region: oregon # Matches your screenshot
